name: Public beta feedback
description: Share the result of one supervised workflow attempt
title: "[Pilot]: "
labels: []
body:
  - type: markdown
    attributes:
      value: |
        Thank you for testing the public beta. Report the first confusing or unreliable step, even if the task eventually succeeded. Do not include private code or secrets.
  - type: input
    id: version
    attributes:
      label: Installed version
      placeholder: 3.3.0
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: Windows 11, VS Code, Codex Desktop, Claude Code ...
    validations:
      required: true
  - type: dropdown
    id: setup
    attributes:
      label: Did setup complete with doctor PASS?
      options:
        - "Yes"
        - "No"
    validations:
      required: true
  - type: dropdown
    id: workflow
    attributes:
      label: How far did the workflow reach?
      options:
        - REVIEW_DONE / Waiting For User
        - READY_FOR_REVIEW
        - Implementation or investigation
        - Setup only
        - Blocked before setup
    validations:
      required: true
  - type: textarea
    id: task
    attributes:
      label: Safe task summary
      description: Describe the task type without sharing private source code.
    validations:
      required: true
  - type: textarea
    id: friction
    attributes:
      label: First confusing or unreliable step
    validations:
      required: true
  - type: textarea
    id: useful
    attributes:
      label: What was useful, if anything?
  - type: dropdown
    id: reuse
    attributes:
      label: Would you try it on a second non-critical task?
      options:
        - "Yes"
        - "Maybe"
        - "No"
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy confirmation
      options:
        - label: I removed secrets, credentials, proprietary source code, and customer data.
          required: true
